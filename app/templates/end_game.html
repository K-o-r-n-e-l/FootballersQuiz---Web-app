<!DOCTYPE html>
<html>
<head>
    <title>Koniec gry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='end_game.css') }}">
</head>
<body>

    <div class="background-blur"></div>
    <div class="endgame-container">
        <h1>🎉 Koniec gry! 🎉</h1>
        <p>Twój końcowy wynik to: <strong>{{ final_score }}</strong> punktów!</p>
        {% for value in round_history.values() %}
            <p>{{ value }}</p>
        {% endfor %}

        <a href="{{ url_for('card_game') }}">Zagraj ponownie</a>
        <a href="{{ url_for('logout') }}"><button>Wyloguj się</button></a>
    </div>

</body>
</html>
